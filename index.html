<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #f7f7f8;
    color: #222;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #e2e2e2;
    background: #ffffff;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #111;
  }

  header p {
    color: #777;
    font-size: 13px;
    margin-top: 4px;
  }

  nav {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid #e2e2e2;
    background: #ffffff;
    position: sticky;
    top: 0;
    z-index: 10;
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #666;
    cursor: pointer;
    font-size: 13px;
    padding: 12px 18px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  nav button:hover { color: #222; }

  nav button.active {
    color: #111;
    border-bottom-color: #111;
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .tab { display: none; }
  .tab.active { display: block; }

  h2 {
    font-size: 18px;
    font-weight: 600;
    color: #111;
    margin-bottom: 4px;
  }

  .subtitle {
    color: #777;
    font-size: 13px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
  }

  h3 {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 28px 0 12px;
  }

  p { color: #444; margin-bottom: 10px; }
  strong { color: #111; }

  .card {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #111;
    margin-bottom: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }

  .step {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
  }

  .step::before {
    color: #bbb;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 20px;
  }

  th {
    text-align: left;
    color: #777;
    font-size: 11px;
    text-transform: uppercase;
    padding: 8px 10px;
    border-bottom: 1px solid #e2e2e2;
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid #f0f0f0;
    color: #444;
  }

  tr:hover td { background: #f5f5f5; }

  .badge {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    background: #f0f0f0;
    border: none;
    margin: 1px;
  }

  /* softened affinity colors */
  .fire { background: #ffe5e0; color: #c94a2f; }
  .frost { background: #e6f4ff; color: #3a7ca5; }
  .radioactive { background: #eefadf; color: #6c8c2f; }
  .toxic { background: #f3e8ff; color: #7b4db2; }
  .tropical { background: #e6f7ef; color: #2e8b57; }
  .mechanical { background: #fff2e0; color: #b8792c; }
  .anomalous { background: #ffe6f2; color: #b23a7a; }
  .desert { background: #fff8e1; color: #a68a2a; }

  .chain {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .search-wrap input {
    width: 100%;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 8px;
    color: #222;
    font-size: 14px;
    padding: 10px 14px;
  }

  .search-wrap input::placeholder { color: #aaa; }

  .move-name { color: #111; }
  .move-desc { color: #666; }

  .analyze-btn {
    width: 100%;
    background: #111;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    margin-top: 14px;
  }

  .analyze-btn:hover { background: #333; }

  .reco-box {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    color: #444;
  }

  .warn {
    background: #fff4e5;
    border: 1px solid #f0d2a8;
    color: #9a6b2f;
  }

  .tip {
    background: #eef7f0;
    border: 1px solid #cfe6d4;
    color: #2e7d32;
  }
</style>
