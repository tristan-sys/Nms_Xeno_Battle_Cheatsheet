<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #f7f7f8;
    color: #222;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #e2e2e2;
    background: #ffffff;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #111;
  }

  header p {
    color: #777;
    font-size: 13px;
    margin-top: 4px;
  }

  nav {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid #e2e2e2;
    background: #ffffff;
    position: sticky;
    top: 0;
    z-index: 10;
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #666;
    cursor: pointer;
    font-size: 13px;
    padding: 12px 18px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  nav button:hover { color: #222; }

  nav button.active {
    color: #111;
    border-bottom-color: #111;
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .tab { display: none; }
  .tab.active { display: block; }

  h2 {
    font-size: 18px;
    font-weight: 600;
    color: #111;
    margin-bottom: 4px;
  }

  .subtitle {
    color: #777;
    font-size: 13px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
  }

  h3 {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 28px 0 12px;
  }

  p { color: #444; margin-bottom: 10px; }
  strong { color: #111; }

  .card {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #111;
    margin-bottom: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }

  .step {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
  }

  .step::before {
    color: #bbb;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 20px;
  }

  th {
    text-align: left;
    color: #777;
    font-size: 11px;
    text-transform: uppercase;
    padding: 8px 10px;
    border-bottom: 1px solid #e2e2e2;
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid #f0f0f0;
    color: #444;
  }

  tr:hover td { background: #f5f5f5; }

  .badge {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    background: #f0f0f0;
    border: none;
    margin: 1px;
  }

  /* softened affinity colors */
  .fire { background: #ffe5e0; color: #c94a2f; }
  .frost { background: #e6f4ff; color: #3a7ca5; }
  .radioactive { background: #eefadf; color: #6c8c2f; }
  .toxic { background: #f3e8ff; color: #7b4db2; }
  .tropical { background: #e6f7ef; color: #2e8b57; }
  .mechanical { background: #fff2e0; color: #b8792c; }
  .anomalous { background: #ffe6f2; color: #b23a7a; }
  .desert { background: #fff8e1; color: #a68a2a; }

  .chain {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .search-wrap input {
    width: 100%;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 8px;
    color: #222;
    font-size: 14px;
    padding: 10px 14px;
  }

  .search-wrap input::placeholder { color: #aaa; }

  .move-name { color: #111; }
  .move-desc { color: #666; }

  .analyze-btn {
    width: 100%;
    background: #111;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    margin-top: 14px;
  }

  .analyze-btn:hover { background: #333; }

  .reco-box {
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    color: #444;
  }

  .warn {
    background: #fff4e5;
    border: 1px solid #f0d2a8;
    color: #9a6b2f;
  }

  .tip {
    background: #eef7f0;
    border: 1px solid #cfe6d4;
    color: #2e7d32;
  }
</style>
<style>
  :root {
    --bg: #edf1ee;
    --surface: rgba(255, 255, 255, 0.82);

    --surface-soft: #f6f8f7;
    --text: #18201c;
    --muted: #66716c;
    --line: rgba(24, 32, 28, 0.1);

    --shadow: 0 10px 30px rgba(24, 32, 28, 0.08);
    --radius: 8px;

  * {
    box-sizing: border-box;

    padding: 0;
  }

  html {
    scroll-behavior: smooth;

  body {

    font-size: 15px;
    line-height: 1.65;

    backdrop-filter: blur(14px);
    box-shadow: var(--shadow);

  header h1 {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: 0;
    color: var(--text);
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    max-width: 640px;
  }

  nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    max-width: 940px;
    margin: 0 auto;
    padding: 0 14px 10px;
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 16px 16px;
    background: var(--surface);
    backdrop-filter: blur(14px);
    position: sticky;
    top: 10px;
    z-index: 10;
    box-shadow: var(--shadow);
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar {
    display: none;
  }

  nav button {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 999px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    white-space: nowrap;
    transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }

  nav button:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.7);
    border-color: var(--line);
    transform: translateY(-1px);
  }

  nav button.active {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: rgba(47, 110, 98, 0.18);
  }

  main {
    max-width: 940px;
    margin: 0 auto;
    padding: 24px 18px 72px;
  }

  .tab {
    display: none;
  }

  .tab.active {
    display: block;
    animation: fade-up 0.28s ease;
  }

  h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }

  h3 {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 32px 0 14px;
  }

  p {
    color: #31403a;

  }

  strong {
    color: var(--text);

  }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);

  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .step {
    display: grid;
    grid-template-columns: 18px 1fr;

  }

  .step:last-child {
    border-bottom: none;
  }

  .step::before {
    content: "";

    margin-top: 8px;

  }

  table {

    box-shadow: var(--shadow);
  }

  th {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;

    letter-spacing: 0.12em;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);

  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(24, 32, 28, 0.06);
    color: #31403a;
    vertical-align: top;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background: rgba(47, 110, 98, 0.04);
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;

    background: #eef2f0;
    color: #405049;
    border: 1px solid rgba(24, 32, 28, 0.08);

  }

  .fire { background: #ffe7df; color: #aa4f33; }
  .frost { background: #e4f1ff; color: #356e94; }
  .radioactive { background: #edf6dd; color: #5d7f26; }
  .toxic { background: #f3e7ff; color: #7447a0; }
  .tropical { background: #e6f5eb; color: #2f7a55; }
  .mechanical { background: #fff1de; color: #9f6a20; }
  .anomalous { background: #ffe5f0; color: #a83a70; }
  .desert { background: #fff5d8; color: #98781f; }

  .search-wrap input {
    width: 100%;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
  }

  .search-wrap input::placeholder {
    color: #8b9691;
  }

  .search-wrap input:focus {
    border-color: rgba(47, 110, 98, 0.4);
    box-shadow: 0 0 0 4px rgba(47, 110, 98, 0.1);
    background: #ffffff;
  }

  .move-name {
    color: var(--text);
    font-weight: 600;
  }

  .move-desc {
    color: var(--muted);
  }

  .analyze-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    margin-top: 14px;
    box-shadow: 0 10px 24px rgba(47, 110, 98, 0.22);
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  }

  .analyze-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
    box-shadow: 0 14px 28px rgba(47, 110, 98, 0.24);
  }

  .warn {
    background: #fff3df;
    border-color: #efd4a2;
    color: #8c6427;
  }

  .tip {
    background: #eaf6ee;
    border-color: #c9e2d1;
    color: #2d6b42;
  }

  @keyframes fade-up {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 700px) {
    header {
      margin-top: 14px;
      padding: 22px 18px 16px;
      border-radius: 14px 14px 0 0;
    }

    nav {
      top: 8px;
      padding: 0 10px 10px;
      border-radius: 0 0 14px 14px;
    }

    main {
      padding: 20px 14px 56px;
    }

    .grid {
      grid-template-columns: 1fr;

      font-size: 21px;
